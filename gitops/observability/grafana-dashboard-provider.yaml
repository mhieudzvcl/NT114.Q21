apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: thesis-dashboards
        orgId: 1
        folder: Thesis
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
      - name: thesis-latency
        orgId: 1
        folder: Thesis
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards-latency
