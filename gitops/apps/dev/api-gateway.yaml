apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: humhieu/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.default.svc.cluster.local:8081"
            - name: USER_SERVICE_URL
              value: "http://user-service.default.svc.cluster.local:8082"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service.default.svc.cluster.local:8083"
            - name: ORDER_SERVICE_URL
              value: "http://order-service.default.svc.cluster.local:8084"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service.default.svc.cluster.local:8085"
            - name: JWT_SECRET
              value: "my-super-secret-key-2026"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
