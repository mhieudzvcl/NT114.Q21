name: ci-services

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          echo 'matrix={"service":["api-gateway","auth-service","user-service","product-service","order-service","notification-service"]}' >> $GITHUB_OUTPUT

  build-test-scan:
    runs-on: ubuntu-latest
    needs: detect
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install
      - name: Unit test
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: services/${{ matrix.service }}
          args: >
            -Dsonar.projectKey=${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker Image
        run: docker build -t ${{ matrix.service }}:latest -f Dockerfile .
        
      - name: Trivy FS & Image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "${{ matrix.service }}:latest"
          format: "table"
          exit-code: "0" # Đặt tạm là 0 để demo không bị lỗi ngắt ngan workflow
          severity: "CRITICAL,HIGH"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
